name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies (no py-clob-client in CI)
        run: |
          uv pip install --system \
            "httpx>=0.27" \
            "fastapi>=0.111" \
            "uvicorn" \
            "python-dotenv>=1.0" \
            "websockets>=12.0" \
            "pytest>=8.0" \
            "pytest-asyncio>=0.23"

      - name: Run tests
        run: |
          pytest tests/test_scanner.py tests/test_quoter.py tests/test_risk.py \
            tests/test_builder_auth.py -v \
            --asyncio-mode=auto
